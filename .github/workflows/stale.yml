name: Stale issues & PRs

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had recent activity. It will be closed in 14 days if no
            further activity occurs. If this is still relevant, please leave
            a comment or remove the `stale` label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has not had recent activity. It will be closed in 14 days if
            no further activity occurs.
          close-issue-message: >
            Closed as stale. Feel free to reopen if still relevant.
          close-pr-message: >
            Closed as stale. Feel free to reopen if still relevant.
          # Don't mark issues with these labels as stale
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
